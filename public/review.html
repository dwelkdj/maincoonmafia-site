<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCM Review</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

/* PIN Screen */
.pin-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 1rem; }
.pin-screen h2 { color: #f5c842; font-size: 1.5rem; }
.pin-input { background: #1a1a1a; border: 2px solid #333; color: #fff; font-size: 1.5rem; padding: 0.8rem 1.2rem; border-radius: 8px; text-align: center; width: 200px; letter-spacing: 4px; }
.pin-input:focus { outline: none; border-color: #f5c842; }
.pin-btn { background: #f5c842; color: #0a0a0a; border: none; padding: 0.8rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; }
.pin-error { color: #ff4444; font-size: 0.9rem; min-height: 1.5rem; }

/* Review Screen */
.review-screen { display: none; padding: 1rem; max-width: 1200px; margin: 0 auto; }
.header { padding: 1rem 0; border-bottom: 1px solid #222; margin-bottom: 1rem; }
.header h1 { color: #f5c842; font-size: 1.3rem; margin-bottom: 0.5rem; }

/* Progress */
.progress-wrap { background: #1a1a1a; border-radius: 8px; height: 8px; overflow: hidden; margin-bottom: 0.3rem; }
.progress-bar { height: 100%; background: linear-gradient(90deg, #4ade80, #f5c842); border-radius: 8px; transition: width 0.4s ease; }
.progress-text { font-size: 0.8rem; color: #888; }
.progress-text span { color: #4ade80; font-weight: 600; }

/* Grid */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
@media (max-width: 600px) { .grid { grid-template-columns: 1fr; gap: 0.8rem; } }

/* Card */
.card { border-radius: 10px; overflow: hidden; border: 2px solid #222; transition: all 0.3s ease; }
.card.approved { border-color: #4ade80; }
.card.rejected { opacity: 0; height: 0; margin: 0; padding: 0; border: 0; overflow: hidden; }
.card-img-wrap { position: relative; }
.card-img-wrap img { width: 100%; display: block; cursor: pointer; }
.card-label { padding: 0.5rem 0.8rem; font-size: 0.8rem; background: #111; color: #aaa; }

/* Approve overlay */
.card.approved .card-img-wrap::after { 
    content: '✓ APPROVED'; 
    position: absolute; top: 10px; left: 10px; 
    background: #4ade80; color: #000; 
    padding: 4px 12px; border-radius: 4px; 
    font-size: 0.75rem; font-weight: 800; 
}

/* Action buttons on each card */
.card-actions { display: flex; border-top: 1px solid #222; }
.card-actions button { flex: 1; padding: 0.7rem; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 700; transition: background 0.2s; }
.btn-approve { background: #1a2e1a; color: #4ade80; }
.btn-approve:hover, .btn-approve:active { background: #2a4a2a; }
.btn-reject { background: #2e1a1a; color: #f87171; }
.btn-reject:hover, .btn-reject:active { background: #4a2a2a; }
.card.approved .card-actions { display: none; }

/* Done screen */
.done-screen { display: none; text-align: center; padding: 4rem 2rem; }
.done-screen h2 { color: #4ade80; font-size: 2rem; margin-bottom: 1rem; }
.done-screen p { color: #888; font-size: 1.1rem; }
.done-stats { display: flex; justify-content: center; gap: 2rem; margin-top: 1.5rem; }
.done-stat { font-size: 1.5rem; font-weight: 700; }
.done-stat.approved { color: #4ade80; }
.done-stat.rejected { color: #f87171; }

/* Lightbox */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; }
.lightbox.active { display: flex; }
.lightbox img { max-width: 95vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
.lightbox-close { position: absolute; top: 1rem; right: 1rem; color: #fff; font-size: 2rem; cursor: pointer; z-index: 101; }

/* Toast */
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 600; font-size: 0.85rem; display: none; z-index: 200; }
.toast.approve { background: #4ade80; color: #000; }
.toast.reject { background: #f87171; color: #000; }

/* Rejection reason modal */
.reject-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; align-items: center; justify-content: center; }
.reject-modal.active { display: flex; }
.reject-modal-box { background: #1a1a1a; border: 2px solid #f87171; border-radius: 12px; padding: 1.5rem; width: min(420px, 90vw); display: flex; flex-direction: column; gap: 1rem; }
.reject-modal-box h3 { color: #f87171; font-size: 1rem; margin: 0; }
.reject-reason-input { background: #0d0d0d; border: 1px solid #444; border-radius: 8px; color: #f0f0f0; font-size: 0.9rem; padding: 0.7rem 0.9rem; resize: vertical; min-height: 80px; width: 100%; font-family: inherit; }
.reject-reason-input:focus { outline: none; border-color: #f87171; }
.reject-modal-actions { display: flex; gap: 0.75rem; }
.btn-cancel-reject { flex: 1; background: #2a2a2a; color: #aaa; border: 1px solid #444; border-radius: 8px; padding: 0.65rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
.btn-cancel-reject:hover { background: #333; }
.btn-confirm-reject { flex: 2; background: #f87171; color: #000; border: none; border-radius: 8px; padding: 0.65rem; font-size: 0.9rem; font-weight: 700; cursor: pointer; }
.btn-confirm-reject:hover { background: #f95959; }
</style>
</head>
<body>

<div class="pin-screen" id="pinScreen">
    <h2>🐱 Maine Coon Mafia</h2>
    <p style="color:#888">Enter PIN to review mockups</p>
    <input type="password" class="pin-input" id="pinInput" maxlength="8" inputmode="numeric" autocomplete="off">
    <button class="pin-btn" onclick="submitPin()">Enter</button>
    <p class="pin-error" id="pinError"></p>
</div>

<div class="review-screen" id="reviewScreen">
    <div class="header">
        <h1 id="batchName">Mockup Review</h1>
        <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
        <p class="progress-text"><span id="progressCount">0</span> of <span id="progressTotal">0</span> reviewed</p>
    </div>
    <div class="grid" id="grid"></div>
</div>

<div class="done-screen" id="doneScreen">
    <h2>✓ All Done!</h2>
    <p>Review complete. Your decisions have been saved.</p>
    <div class="done-stats">
        <div class="done-stat approved" id="doneApproved">0 approved</div>
        <div class="done-stat rejected" id="doneRejected">0 rejected</div>
    </div>
</div>

<div class="reject-modal" id="rejectModal">
    <div class="reject-modal-box">
        <h3>✗ Reject this design</h3>
        <textarea class="reject-reason-input" id="rejectReasonInput" placeholder="Why are you rejecting this? (optional)" rows="3"></textarea>
        <div class="reject-modal-actions">
            <button class="btn-cancel-reject" onclick="cancelReject()">Cancel</button>
            <button class="btn-confirm-reject" onclick="confirmReject()">Confirm Reject</button>
        </div>
    </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImg">
</div>

<div class="toast" id="toast"></div>

<script>
const batchId = window.location.pathname.split('/review/')[1];
let pin = '';
let images = [];
let pendingRejectId = null;

document.getElementById('pinInput').addEventListener('keydown', e => { if (e.key === 'Enter') submitPin(); });

async function submitPin() {
    pin = document.getElementById('pinInput').value;
    if (!pin) return;
    try {
        const res = await fetch(`/api/review/${batchId}?pin=${pin}`);
        if (res.status === 401) { document.getElementById('pinError').textContent = 'Wrong PIN'; return; }
        if (!res.ok) throw new Error('Batch not found');
        const data = await res.json();
        images = data.images;
        document.getElementById('batchName').textContent = data.batchName;
        document.getElementById('pinScreen').style.display = 'none';
        document.getElementById('reviewScreen').style.display = 'block';
        renderGrid();
        updateProgress();
    } catch (err) {
        document.getElementById('pinError').textContent = err.message;
    }
}

function renderGrid() {
    document.getElementById('grid').innerHTML = images.map((img, i) => `
        <div class="card ${img.status}" id="card-${i}">
            <div class="card-img-wrap">
                <img src="${img.url}" loading="lazy" alt="${img.label}" onclick="openLightbox(${i})">
            </div>
            <div class="card-label">${img.label}</div>
            <div class="card-actions">
                <button class="btn-approve" onclick="decide(${i},'approved')">✓ Approve</button>
                <button class="btn-reject" onclick="decide(${i},'rejected')">✗ Reject</button>
            </div>
        </div>
    `).join('');
}

function decide(id, status) {
    if (status === 'rejected') {
        pendingRejectId = id;
        document.getElementById('rejectReasonInput').value = '';
        document.getElementById('rejectModal').classList.add('active');
        setTimeout(() => document.getElementById('rejectReasonInput').focus(), 50);
        return;
    }
    submitDecision(id, 'approved', '');
}

function cancelReject() {
    pendingRejectId = null;
    document.getElementById('rejectModal').classList.remove('active');
}

function confirmReject() {
    if (pendingRejectId === null) return;
    const reason = document.getElementById('rejectReasonInput').value.trim();
    const id = pendingRejectId;
    pendingRejectId = null;
    document.getElementById('rejectModal').classList.remove('active');
    submitDecision(id, 'rejected', reason);
}

async function submitDecision(id, status, reason) {
    images[id].status = status;
    if (reason) images[id].reason = reason;
    const card = document.getElementById(`card-${id}`);

    if (status === 'approved') {
        card.className = 'card approved';
        card.querySelector('.card-actions').style.display = 'none';
        toast('✓ Approved', 'approve');
    } else {
        toast('✗ Rejected', 'reject');
        card.style.transition = 'opacity 0.3s, height 0.4s, margin 0.4s';
        card.style.opacity = '0';
        setTimeout(() => { card.className = 'card rejected'; }, 350);
    }

    updateProgress();

    // Auto-submit this decision
    await fetch(`/api/review/${batchId}/submit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin, decisions: { [id]: status }, reasons: { [id]: reason } })
    });

    // Check if all done
    const pending = images.filter(i => i.status === 'pending').length;
    if (pending === 0) {
        setTimeout(showDone, 600);
    }
}

function updateProgress() {
    const reviewed = images.filter(i => i.status !== 'pending').length;
    const total = images.length;
    document.getElementById('progressCount').textContent = reviewed;
    document.getElementById('progressTotal').textContent = total;
    document.getElementById('progressBar').style.width = `${(reviewed / total) * 100}%`;
}

function showDone() {
    const approved = images.filter(i => i.status === 'approved').length;
    const rejected = images.filter(i => i.status === 'rejected').length;
    document.getElementById('reviewScreen').style.display = 'none';
    document.getElementById('doneScreen').style.display = 'block';
    document.getElementById('doneApproved').textContent = `${approved} approved`;
    document.getElementById('doneRejected').textContent = `${rejected} rejected`;
}

function openLightbox(id) {
    document.getElementById('lightboxImg').src = images[id].url;
    document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }

function toast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type}`;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 1500);
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        closeLightbox();
        cancelReject();
    }
    if (e.key === 'Enter' && document.getElementById('rejectModal').classList.contains('active')) {
        if (e.ctrlKey || e.metaKey) confirmReject();
    }
});
</script>
</body>
</html>
