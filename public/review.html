<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCM Review</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

/* PIN Screen */
.pin-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 1rem; }
.pin-screen h2 { color: #f5c842; font-size: 1.5rem; }
.pin-input { background: #1a1a1a; border: 2px solid #333; color: #fff; font-size: 1.5rem; padding: 0.8rem 1.2rem; border-radius: 8px; text-align: center; width: 200px; letter-spacing: 4px; }
.pin-input:focus { outline: none; border-color: #f5c842; }
.pin-btn { background: #f5c842; color: #0a0a0a; border: none; padding: 0.8rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; }
.pin-error { color: #ff4444; font-size: 0.9rem; min-height: 1.5rem; }

/* Review Screen */
.review-screen { display: none; padding: 1rem; max-width: 1200px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #222; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
.header h1 { color: #f5c842; font-size: 1.3rem; }
.stats { display: flex; gap: 1rem; font-size: 0.85rem; }
.stat { padding: 0.4rem 0.8rem; border-radius: 20px; }
.stat-approved { background: #1a3a1a; color: #4ade80; }
.stat-rejected { background: #3a1a1a; color: #f87171; }
.stat-pending { background: #1a1a2a; color: #93c5fd; }

/* Action bar */
.action-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.action-bar button { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #f0f0f0; cursor: pointer; font-size: 0.85rem; }
.action-bar button:hover { border-color: #f5c842; }
.btn-approve { background: #1a3a1a !important; border-color: #4ade80 !important; color: #4ade80 !important; }
.btn-reject { background: #3a1a1a !important; border-color: #f87171 !important; color: #f87171 !important; }
.btn-submit { background: #f5c842 !important; color: #0a0a0a !important; font-weight: 700; border: none !important; }
.selected-count { color: #f5c842; font-size: 0.85rem; margin-left: 0.5rem; }

/* Grid */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
@media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; } }

/* Card */
.card { position: relative; border-radius: 8px; overflow: hidden; border: 2px solid #222; cursor: pointer; transition: border-color 0.2s, transform 0.1s; }
.card:active { transform: scale(0.98); }
.card.selected { border-color: #f5c842; }
.card.approved { border-color: #4ade80; }
.card.rejected { border-color: #f87171; opacity: 0.5; }
.card img { width: 100%; display: block; aspect-ratio: 1; object-fit: cover; }
.card-label { padding: 0.4rem 0.6rem; font-size: 0.75rem; background: #111; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-check { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
.card.selected .card-check { background: #f5c842; border-color: #f5c842; }
.card.selected .card-check::after { content: '✓'; color: #000; font-weight: bold; font-size: 14px; }
.card-status { position: absolute; top: 8px; left: 8px; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
.card.approved .card-status { background: #4ade80; color: #000; }
.card.rejected .card-status { background: #f87171; color: #000; }

/* Lightbox */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; }
.lightbox.active { display: flex; }
.lightbox img { max-width: 95vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
.lightbox-close { position: absolute; top: 1rem; right: 1rem; color: #fff; font-size: 2rem; cursor: pointer; z-index: 101; }
.lightbox-label { position: absolute; bottom: 1rem; color: #aaa; font-size: 0.9rem; }

/* Toast */
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #4ade80; color: #000; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: 700; display: none; z-index: 200; }
.toast.error { background: #f87171; }
</style>
</head>
<body>

<div class="pin-screen" id="pinScreen">
    <h2>🐱 Maine Coon Mafia</h2>
    <p style="color:#888">Enter PIN to review mockups</p>
    <input type="password" class="pin-input" id="pinInput" maxlength="8" inputmode="numeric" autocomplete="off">
    <button class="pin-btn" onclick="submitPin()">Enter</button>
    <p class="pin-error" id="pinError"></p>
</div>

<div class="review-screen" id="reviewScreen">
    <div class="header">
        <h1 id="batchName">Mockup Review</h1>
        <div class="stats">
            <span class="stat stat-approved" id="statApproved">✓ 0</span>
            <span class="stat stat-rejected" id="statRejected">✗ 0</span>
            <span class="stat stat-pending" id="statPending">⏳ 0</span>
        </div>
    </div>
    
    <div class="action-bar">
        <button onclick="selectAll()">Select All</button>
        <button onclick="deselectAll()">Deselect</button>
        <button class="btn-approve" onclick="markSelected('approved')">✓ Approve</button>
        <button class="btn-reject" onclick="markSelected('rejected')">✗ Reject</button>
        <button class="btn-submit" onclick="submitDecisions()">Submit Decisions</button>
        <span class="selected-count" id="selectedCount"></span>
    </div>
    
    <div class="grid" id="grid"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImg">
    <span class="lightbox-label" id="lightboxLabel"></span>
</div>

<div class="toast" id="toast"></div>

<script>
const batchId = window.location.pathname.split('/review/')[1];
let pin = '';
let images = [];
let selected = new Set();

document.getElementById('pinInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitPin();
});

async function submitPin() {
    pin = document.getElementById('pinInput').value;
    if (!pin) return;
    
    try {
        const res = await fetch(`/api/review/${batchId}?pin=${pin}`);
        if (res.status === 401) {
            document.getElementById('pinError').textContent = 'Wrong PIN';
            return;
        }
        if (!res.ok) throw new Error('Batch not found');
        
        const data = await res.json();
        images = data.images;
        document.getElementById('batchName').textContent = data.batchName;
        document.getElementById('pinScreen').style.display = 'none';
        document.getElementById('reviewScreen').style.display = 'block';
        renderGrid();
        updateStats();
    } catch (err) {
        document.getElementById('pinError').textContent = err.message;
    }
}

function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = images.map((img, i) => `
        <div class="card ${img.status !== 'pending' ? img.status : ''} ${selected.has(i) ? 'selected' : ''}" 
             data-id="${i}" onclick="toggleSelect(event, ${i})" ondblclick="openLightbox(${i})">
            <div class="card-check"></div>
            ${img.status !== 'pending' ? `<span class="card-status">${img.status === 'approved' ? '✓' : '✗'}</span>` : ''}
            <img src="${img.url}" loading="lazy" alt="${img.label}">
            <div class="card-label">${img.label}</div>
        </div>
    `).join('');
}

function toggleSelect(e, id) {
    if (e.detail === 2) return; // ignore double click
    if (selected.has(id)) selected.delete(id);
    else selected.add(id);
    renderGrid();
    document.getElementById('selectedCount').textContent = selected.size ? `${selected.size} selected` : '';
}

function selectAll() {
    images.forEach((_, i) => selected.add(i));
    renderGrid();
    document.getElementById('selectedCount').textContent = `${selected.size} selected`;
}

function deselectAll() {
    selected.clear();
    renderGrid();
    document.getElementById('selectedCount').textContent = '';
}

function markSelected(status) {
    if (!selected.size) { toast('Select images first', true); return; }
    selected.forEach(id => { images[id].status = status; });
    selected.clear();
    renderGrid();
    updateStats();
    document.getElementById('selectedCount').textContent = '';
}

function updateStats() {
    const a = images.filter(i => i.status === 'approved').length;
    const r = images.filter(i => i.status === 'rejected').length;
    const p = images.filter(i => i.status === 'pending').length;
    document.getElementById('statApproved').textContent = `✓ ${a}`;
    document.getElementById('statRejected').textContent = `✗ ${r}`;
    document.getElementById('statPending').textContent = `⏳ ${p}`;
}

async function submitDecisions() {
    const pending = images.filter(i => i.status === 'pending').length;
    if (pending > 0 && !confirm(`${pending} images still pending. Submit anyway?`)) return;
    
    const decisions = {};
    images.forEach((img, i) => { if (img.status !== 'pending') decisions[i] = img.status; });
    
    try {
        const res = await fetch(`/api/review/${batchId}/submit`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pin, decisions })
        });
        const data = await res.json();
        toast(`Submitted! ✓${data.approved} ✗${data.rejected} ⏳${data.pending}`);
    } catch (err) {
        toast('Failed to submit: ' + err.message, true);
    }
}

function openLightbox(id) {
    document.getElementById('lightboxImg').src = images[id].url;
    document.getElementById('lightboxLabel').textContent = images[id].label;
    document.getElementById('lightbox').classList.add('active');
}

function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
}

function toast(msg, error) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (error ? ' error' : '');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
});
</script>
</body>
</html>
